name: qora_devtools_overlay
description: >-
  In-app debug overlay for Qora. Injects a floating panel with Queries,
  Mutations, and Timeline tabs into the running Flutter app — zero overhead
  in release builds.
version: 0.1.0
homepage: https://github.com/meragix/qora
repository: https://github.com/meragix/qora/tree/main/packages/devtools/overlay
issue_tracker: https://github.com/meragix/qora/issues

environment:
  sdk: '>=3.5.0 <4.0.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  lucide_icons_flutter: ^3.1.10
  # qora: ^0.7.0
  qora:
    path: ../../dart
  # qora_devtools_shared: ^0.1.0
  qora_devtools_shared:
    path: ../shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
