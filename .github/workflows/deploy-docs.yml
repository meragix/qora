name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build website
        working-directory: ./docs
        run: npm run build
      
      - name: Create root index with i18n redirect
        run: |
          cat > ./docs/.output/public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <script>
              const lang = navigator.language?.startsWith('fr') ? 'fr' : 'en';
              window.location.replace('/' + lang);
            </script>
          </head>
          </html>
          EOF
          cat > ./docs/.output/public/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <script>
              // Preserve the full path so deep links survive the i18n redirect.
              // GitHub Pages serves 404.html for unknown routes; we detect the
              // locale prefix and either keep the path or prepend the user locale.
              const path = window.location.pathname;
              const isLocalized = /^\/(fr|en)(\/|$)/.test(path);
              if (isLocalized) {
                // Already has a locale prefix — page genuinely doesn't exist.
                const lang = path.startsWith('/fr') ? 'fr' : 'en';
                window.location.replace('/' + lang);
              } else {
                // No locale prefix — prepend the user's locale and retry.
                const lang = navigator.language?.startsWith('fr') ? 'fr' : 'en';
                window.location.replace('/' + lang + path);
              }
            </script>
          </head>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
