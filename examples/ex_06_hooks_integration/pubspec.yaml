name: ex_06_hooks_integration
description: "Hooks integration: useQuery, useMutation, useInfiniteQuery, useIsFetching, useIsMutating with HookWidget."
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.0

  # Flutter hooks
  flutter_hooks: ^0.21.2

  # Qora packages (local path for monorepo)
  qora_flutter:
    path: ../../packages/flutter
  qora_hooks:
    path: ../../packages/hooks
  qora_devtools_overlay:
    path: ../../packages/devtools/overlay

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
